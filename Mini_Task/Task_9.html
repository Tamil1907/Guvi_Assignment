<!DOCTYPE html>
<html>
<head>
    <title>Form with Default Values</title>
</head>
<body>

<form>

    Name:
    <input type="text" value="Tamil"><br><br>

    Password:
    <input type="password" value="12345"><br><br>

    Gender:
    <input type="radio" name="gender" checked> Male
    <input type="radio" name="gender"> Female
    <br><br>

    Skills:
    <input type="checkbox" checked> HTML
    <input type="checkbox"> CSS
    <input type="checkbox" checked> JavaScript
    <br><br>

    Country:
    <select>
        <option>India</option>
        <option selected>USA</option>
        <option>UK</option>
    </select>
    <br><br>

    Message:
    <textarea>Welcome to Guvi</textarea>
    <br><br>

    <input type="submit" value="Submit">

</form>

</body>
</html>
